# Clean-room e2e smoke test for ccx-kit
#
# Usage:
#   # 1. Build tarball on host first:
#   pnpm build && pnpm pack
#
#   # 2. Start mitmproxy (optional, for caching):
#   ./scripts/start-mitmproxy.sh
#
#   # 3. Run the smoke test:
#   docker compose -f tests/docker/docker-compose.yml run --rm smoke-test
#
#   # 4. Or drop into interactive shell:
#   docker compose -f tests/docker/docker-compose.yml run --rm smoke-test bash

services:
  smoke-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: ccx-kit-smoke-test:latest
    container_name: ccx-kit-smoke
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ../..:/home/tester/work:ro
      - ./cache/npm:/home/tester/.npm
      - ./cache/corepack:/home/tester/.cache/node/corepack
      - ./cache/ccx:/home/tester/.local/share/ccx-kit-cache
      # mitmproxy CA cert for HTTPS interception
      - ${MITM_CA_CERT:-~/.mitmproxy/mitmproxy-ca-cert.pem}:/mitm-certs/mitmproxy-ca-cert.pem:ro
    environment:
      - CI=true
      - NO_COLOR=1
      - CCX_KIT_SKIP_PROMPT=1
      # Proxy (mitmproxy on host)
      - HTTP_PROXY=http://host.docker.internal:${CCX_KIT_PROXY_PORT:-18082}
      - HTTPS_PROXY=http://host.docker.internal:${CCX_KIT_PROXY_PORT:-18082}
      - http_proxy=http://host.docker.internal:${CCX_KIT_PROXY_PORT:-18082}
      - https_proxy=http://host.docker.internal:${CCX_KIT_PROXY_PORT:-18082}
      - NO_PROXY=localhost,127.0.0.1,host.docker.internal
      # CA cert trust for all tools (curl, Node.js, Python)
      - SSL_CERT_FILE=/usr/local/share/ca-certificates/mitmproxy-ca.crt
      - CURL_CA_BUNDLE=/usr/local/share/ca-certificates/mitmproxy-ca.crt
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/mitmproxy-ca.crt
    stdin_open: true
    tty: true
    command: [bash, /home/tester/work/tests/docker/smoke-test.sh]
